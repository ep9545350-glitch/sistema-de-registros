<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
  <link rel="icon" href="LogoEDTEC.png">
</head>
<body>

  <div class="bg-scene">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>
  <div class="bg-grid"></div>
  <div class="particles" id="particles"></div>

  <div class="login-wrap">

    <div class="logo-wrap">
      <div class="logo-ring">
        <img src="LogoEDTEC.png" alt="EDTEC Logo">
      </div>
    </div>

    <div class="login-card">

      <h1 class="login-heading">Bienvenido de nuevo</h1>
      <p class="login-sub">Ingresa tus credenciales para continuar</p>

      <div class="field-group">
        <label class="field-label" for="correo">Correo electrónico</label>
        <div class="field-inner">
          <i class="bi bi-envelope field-icon"></i>
          <input type="email" id="correo" class="field-input"
            placeholder="tu@correo.com" autocomplete="email">
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Contraseña</label>
        <div class="field-inner">
          <i class="bi bi-lock field-icon"></i>
          <input type="password" id="password" class="field-input"
            placeholder="••••••••" autocomplete="current-password">
          <button class="btn-eye" type="button" onclick="togglePassword()" aria-label="Mostrar contraseña">
            <i id="iconoPassword" class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <button class="btn-login" id="btnLogin" onclick="handleLogin()">
        <span class="btn-text">Ingresar</span>
        <span class="btn-spinner" aria-hidden="true">
          <span class="spinner-dot"></span>
          <span class="spinner-dot"></span>
          <span class="spinner-dot"></span>
        </span>
      </button>

      <div id="error" class="error-msg" role="alert">
        <i class="bi bi-exclamation-circle"></i>
        <span id="error-text">Correo o contraseña incorrectos</span>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">EDTEC © 2026</span>
        <div class="divider-line"></div>
      </div>

    </div>
  </div>

  <script type="module" src="login.js"></script>

  <script>
    window.history.pushState(null, "", window.location.href);
    window.addEventListener("popstate", () => {
      window.history.pushState(null, "", window.location.href);
    });

    (function spawnStars() {
      const c = document.getElementById('particles');
      for (let i = 0; i < 55; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${Math.random()*5+3}s;animation-delay:${Math.random()*6}s;`;
        c.appendChild(s);
      }
    })();

    function togglePassword() {
      const input = document.getElementById("password");
      const icono = document.getElementById("iconoPassword");
      const visible = input.type === "text";
      input.type = visible ? "password" : "text";
      icono.classList.toggle("bi-eye", visible);
      icono.classList.toggle("bi-eye-slash", !visible);
    }

    function showError(msg) {
      const box = document.getElementById("error");
      const txt = document.getElementById("error-text");
      txt.textContent = msg || "Correo o contraseña incorrectos";
      box.style.display = "flex";
      box.style.animation = "none";
      void box.offsetWidth;
      box.style.animation = "errorPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both";
      ["correo", "password"].forEach(id => {
        const el = document.getElementById(id);
        el.classList.add("error-state");
        el.addEventListener("input", () => el.classList.remove("error-state"), { once: true });
      });
    }

    async function handleLogin() {
      const btn = document.getElementById("btnLogin");
      const errorBox = document.getElementById("error");
      errorBox.style.display = "none";
      btn.classList.add("loading");
      try {
        if (typeof window.login === "function") await window.login();
      } catch (e) {
        showError(e?.message || "Error al iniciar sesión");
      } finally {
        btn.classList.remove("loading");
      }
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });

    ["correo", "password"].forEach(id => {
      document.getElementById(id).addEventListener("input", () => {
        document.getElementById("error").style.display = "none";
      });
    });
  </script>

</body>
</html>
