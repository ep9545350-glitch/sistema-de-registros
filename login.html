<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>

    <!-- 🔥 Evitar caché del navegador -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="LogoEDTEC.png">
</head>

<body>

    <div class="login-container">

        <!-- LOGO -->
        <div class="mb-4 text-center">
            <img src="LogoEDTEC.png" alt="Logo" class="logo-login">
        </div>

        <!-- CARD -->
        <div class="card login-card shadow-lg">

            <h3 class="text-center login-title mb-1">Bienvenido</h3>
            <p class="text-center text-muted mb-4">Inicia sesión para continuar</p>

            <input type="email" id="correo" class="form-control mb-3" placeholder="Correo electrónico">

            <div class="input-group mb-3">
                <input type="password" id="password" class="form-control" placeholder="Contraseña">
                <button class="btn btn-outline-secondary btn-password" type="button" onclick="togglePassword()">
                    <i id="iconoPassword" class="bi bi-eye"></i>
                </button>
            </div>

            <button class="btn btn-login w-100" onclick="login()">
                Ingresar
            </button>

            <div id="error" content="text-danger mt-3 text-center small"></div>

        </div>
    </div>

    <script type="module" src="login.js"></script>

    <script>
        // 🔥 Bloquear botón "atrás" en la página de login
        // Si alguien llega aquí después de cerrar sesión, no puede volver al sistema
        window.history.pushState(null, "", window.location.href);
        window.addEventListener("popstate", function () {
            window.history.pushState(null, "", window.location.href);
        });

        function togglePassword() {
            const input = document.getElementById("password");
            const icono = document.getElementById("iconoPassword");
            if (input.type === "password") {
                input.type = "text";
                icono.classList.replace("bi-eye", "bi-eye-slash");
            } else {
                input.type = "password";
                icono.classList.replace("bi-eye-slash", "bi-eye");
            }
        }
    </script>

</body>

</html>
