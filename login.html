<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

    <div class="text-center">

        <!-- 🔥 LOGO FUERA -->
        <div class="mb-3">
            <img src="LogoEDTEC.png" alt="Logo" class="logo-login">
        </div>

        <!-- 🔐 CARD LOGIN -->
        <div class="card p-4 shadow login-card">

            <h4 class="text-center mb-3">Iniciar Sesión</h4>

            <input type="email" id="correo" class="form-control mb-2" placeholder="Correo">

            <div class="input-group mb-3">
                <input type="password" id="password" class="form-control" placeholder="Contraseña">

                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                    <i id="iconoPassword" class="bi bi-eye"></i>
                </button>
            </div>

            <button class="btn btn-primary w-100" onclick="login()">Ingresar</button>

            <div id="error" class="text-danger mt-2 text-center"></div>

        </div>

    </div>

    <script type="module" src="login.js"></script>
    <script>
        function togglePassword() {
            const input = document.getElementById("password");
            const icono = document.getElementById("iconoPassword");

            if (input.type === "password") {
                input.type = "text";
                icono.classList.remove("bi-eye");
                icono.classList.add("bi-eye-slash");
            } else {
                input.type = "password";
                icono.classList.remove("bi-eye-slash");
                icono.classList.add("bi-eye");
            }
        }
    </script>

</body>

</html>
