<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de control</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="estilos.css">
  <link rel="icon" href="LogoEDTEC.png">
</head>

<body>

  <!-- 🔔 TOAST -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- 📱 BOTÓN MENU MOBILE -->
  <button class="toggle-btn" onclick="toggleMenu()">☰</button>

  <!-- 🔥 OVERLAY -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMenu()"></div>

  <!-- 🔵 SIDEBAR — fuera del container -->
  <div class="sidebar" id="sidebar">
    <canvas id="starCanvas"></canvas> 
    <div class="sidebar-line"></div>

    <div class="logo-area">
      <img src="LogoEDTEC.png" alt="Logo" class="logo-sidebar logo-circle">
      <span class="logo-text">EDTEC</span>
    </div>

    <span class="menu-label">Principal</span>

    <button onclick="mostrarSeccion('formulario')">
      <i class="ti ti-forms icon"></i>
      <span>Formulario</span>
      <span class="btn-dot"></span>
    </button>

    <button onclick="mostrarSeccion('tabla')">
      <i class="ti ti-table icon"></i>
      <span>Ver Tabla</span>
      <span class="btn-dot"></span>
    </button>

    <button onclick="mostrarSeccion('dashboard')">
      <i class="ti ti-layout-dashboard icon"></i>
      <span>Dashboard</span>
      <span class="btn-dot"></span>
    </button>

    <button onclick="logout()" class="btn-cerrar">
      <i class="ti ti-logout icon"></i>
      <span>Cerrar sesión</span>
      <span class="btn-dot"></span>
    </button>

    <p class="sidebar-version">v2.0 · EDTEC</p>
  </div>

  <!-- 🟢 CONTENIDO PRINCIPAL -->
  <div class="contenido">

    <!-- 📊 DASHBOARD -->
    <div id="dashboard" class="seccion card mb-3">
      <div class="card-body">

        <h5>📊 Dashboard Matrimonios</h5>

        <div class="row mb-3">
          <div class="col-12 col-md-4 mb-2">
            <input type="date" id="filtroFechaDesdeDashboard" class="form-control">
          </div>
          <div class="col-12 col-md-4 mb-2">
            <input type="date" id="filtroFechaHastaDashboard" class="form-control">
          </div>
          <div class="col-12 col-md-4 mb-2 d-flex gap-2 flex-wrap">
            <button class="btn btn-primary" onclick="generarDashboard()">Filtrar</button>
            <button class="btn btn-danger" onclick="exportarDashboardPDF()">📥 Exportar PDF</button>
          </div>
        </div>

        <div id="dashboardMatrimonio" class="row g-3"></div>

        <div class="row mt-4">
          <div class="col-12 col-md-6 mb-3">
            <canvas id="graficoBarras"></canvas>
          </div>
          <div class="col-12 col-md-6 mb-3">
            <canvas id="graficoTorta"></canvas>
          </div>
        </div>

      </div>
    </div>

    <!-- 🧾 FORMULARIO -->
    <div id="formulario" class="seccion card mb-3 activa">
      <div class="card-body">

        <h5>📝 Formulario</h5>
        <div id="formularioDinamico" class="row g-2"></div>
        <button class="btn btn-primary mt-3" onclick="agregarDato()">➕ Agregar</button>

      </div>
    </div>

    <!-- 📋 TABLA -->
    <div id="tabla" class="seccion card mb-3">
      <div class="card-body">

        <h5>📋 Registros</h5>

        <!-- SELECTOR -->
        <select id="selectorHoja" class="form-select mb-2"></select>

        <!-- 🔍 FILTROS -->
        <div class="row g-2 mb-3">
          <div class="col-6 col-md-4">
            <select id="filtroTipoMatrimonio" class="form-select"></select>
          </div>
          <div class="col-6 col-md-4">
            <input type="text" id="filtroNombre" class="form-control" placeholder="Buscar nombre">
          </div>
          <div class="col-6 col-md-4">
            <input type="text" id="filtroDni" class="form-control" placeholder="Buscar DNI">
          </div>
          <div class="col-6 col-md-4">
            <input type="date" id="filtroFechaDesde" class="form-control">
          </div>
          <div class="col-6 col-md-4">
            <input type="date" id="filtroFechaHasta" class="form-control">
          </div>
        </div>

        <!-- BOTONES FILTRAR -->
        <div class="d-flex gap-2 mb-3 flex-wrap">
          <button class="btn btn-warning" onclick="aplicarFiltros()">🔍 Filtrar</button>
          <button class="btn btn-secondary" onclick="limpiarFiltros()">🧹 Limpiar</button>
          <button class="btn btn-danger" onclick="abrirModalColumnas()">📥 Exportar PDF</button>
        </div>

        <!-- 📊 TABLA -->
        <div id="contenedorTabla" style="display:none;">
          <div class="scroll-superior">
            <div class="scroll-bar"></div>
          </div>
          <div class="tabla-scroll">
            <table class="table table-bordered table-striped">
              <thead id="thead" class="table-dark"></thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </div>

        <!-- PAGINACIÓN -->
        <div class="mt-3" id="paginacion">
          <button class="btn btn-secondary" onclick="anteriorPagina()">← Anterior</button>
          <button class="btn btn-secondary" onclick="siguientePagina()">Siguiente →</button>
        </div>

      </div>
    </div>

  </div><!-- fin .contenido -->

  <!-- 🔥 BOTONES FLOTANTES -->
  <div class="botones-flotantes">
    <button onclick="editarFila()" class="btn btn-warning">✏️ Editar</button>
    <button onclick="guardarEdicion()" class="btn btn-success">💾 Guardar</button>
    <button onclick="eliminarFila()" class="btn btn-danger">🗑️ Eliminar</button>
  </div>

  <!-- 🧾 MODAL -->
  <div class="modal fade" id="modalColumnas" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Seleccionar columnas para PDF</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <div id="listaColumnas" class="row"></div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="seleccionarTodo(true)">Seleccionar todo</button>
          <button class="btn btn-warning" onclick="seleccionarTodo(false)">Quitar todo</button>
          <button class="btn btn-danger" onclick="generarPDFSeleccionado()">📥 Exportar PDF</button>
        </div>

      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="firebase.js"></script>
  <script type="module" src="logueado.js"></script>
  <script type="module" src="auth.js"></script>
  <script src="appp.js"></script>
  <script src="pfd.js"></script>
  <script src="excel.js"></script>
  <script src="scroll.js"></script>

  <script>
    function toggleMenu() {
      document.getElementById("sidebar").classList.toggle("activa");
      document.getElementById("sidebarOverlay").classList.toggle("activa");
    }

    function mostrarSeccion(id) {
      document.querySelectorAll(".seccion").forEach(sec => {
        sec.classList.remove("activa");
      });
      document.getElementById(id).classList.add("activa");
      controlarBotonesFlotantes(id);

      if (window.innerWidth <= 768) {
        document.getElementById("sidebar").classList.remove("activa");
        document.getElementById("sidebarOverlay").classList.remove("activa");
      }
    }
  </script>

</body>

</html>
