<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Sistema Excel Pro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow-x: hidden;
      background: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
    }

    /* SIDEBAR */
    .sidebar {
      min-height: 100vh;
      background: linear-gradient(180deg, #1e1e2f, #2c2c54);
      color: white;
      padding: 20px 10px;
      transition: all 0.3s;
    }

    .sidebar h5 {
      font-weight: bold;
      margin-bottom: 20px;
    }

    .sidebar button {
      width: 100%;
      margin-bottom: 10px;
      border-radius: 10px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: 0.3s;
    }

    .sidebar button:hover {
      background: #0d6efd;
      transform: scale(1.03);
    }

    /* CONTENIDO */
    .contenido {
      padding: 20px;
    }

    /* SECCIONES */
    .seccion {
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .seccion.activa {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* CARDS */
    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
    }

    .card h5 {
      font-weight: bold;
      margin-bottom: 15px;
    }

    /* TABLA */
    .tabla-responsive {
      overflow-x: auto;
      border-radius: 10px;
    }

    table {
      border-radius: 10px;
      overflow: hidden;
    }

    th,
    td {
      white-space: nowrap;
      font-size: 13px;
    }

    thead {
      background: #0d6efd;
      color: white;
    }

    /* BOTONES */
    .btn {
      border-radius: 10px;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* INPUTS */
    .form-control,
    .form-select {
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .form-control:focus {
      box-shadow: 0 0 5px rgba(13, 110, 253, 0.5);
      border-color: #0d6efd;
    }

    /* MODAL PRO */
    .modal-content {
      border-radius: 15px;
      border: none;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
      background: linear-gradient(90deg, #0d6efd, #6610f2);
    }

    .modal-title {
      font-weight: bold;
    }

    .modal-footer button {
      border-radius: 10px;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {

      .sidebar {
        position: fixed;
        width: 220px;
        left: -220px;
        top: 0;
        z-index: 1000;
      }

      .sidebar.activa {
        left: 0;
      }

      .contenido {
        margin-left: 0;
        padding: 15px;
      }

      .toggle-btn {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 1100;
        background: #0d6efd;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 8px 12px;
      }
    }
  </style>
</head>

<body>
  <button class="toggle-btn d-md-none" onclick="toggleMenu()">☰</button>

  <div class="container-fluid">
    <div class="row">

      <!-- MENÚ -->
      <div class="col-md-2 sidebar">
        <h5 class="text-center">📊 Menú</h5>

        <button class="btn btn-dark" onclick="mostrarSeccion('excel')">Subir Excel</button>
        <button class="btn btn-dark" onclick="mostrarSeccion('formulario')">Formulario</button>
        <button class="btn btn-dark" onclick="mostrarSeccion('tabla')">Ver Tabla</button>
        <button class="btn btn-dark" onclick="mostrarSeccion('dashboard')">Dashboard</button>
      </div>

      <!-- CONTENIDO -->
      <div class="col-md-10 contenido">

        <!-- DASHBOARD -->
        <div id="dashboard" class="seccion card mb-3">
          <div class="card-body">

            <h5>📊 Dashboard Matrimonios</h5>

            <!-- FILTRO FECHA -->
            <div class="row mb-3">
              <div class="col-md-4">
                <input type="month" id="filtroMesDashboard" class="form-control">
              </div>
              <div class="col-md-4">
                <button class="btn btn-primary" onclick="generarDashboard()">Filtrar</button>
                <button class="btn btn-danger mt-2" onclick="exportarDashboardPDF()">
                  📥 Exportar Dashboard PDF
                </button>
              </div>
            </div>

            <div id="dashboardMatrimonio" class="row g-3"></div>
            <div class="row mt-4">
              <div class="col-md-6">
                <canvas id="graficoBarras"></canvas>
              </div>
              <div class="col-md-6">
                <canvas id="graficoTorta"></canvas>
              </div>
            </div>

            <!-- CONTENEDOR -->


          </div>
        </div>

        <!-- SUBIR -->
        <div id="excel" class="seccion activa card mb-3">
          <div class="card-body">
            <h5>Subir Excel</h5>
            <input type="file" id="fileInput" class="form-control">
          </div>
        </div>

        <!-- FORMULARIO -->
        <div id="formulario" class="seccion card mb-3">
          <div class="card-body">
            <h5>Formulario</h5>

            <div id="formularioDinamico" class="row g-2"></div>

            <button class="btn btn-primary mt-3" onclick="agregarDato()">Agregar</button>
            <button class="btn btn-success mt-3" onclick="exportarExcel()">Exportar</button>
          </div>
        </div>

        <!-- 🔥 TABLA + FILTROS JUNTOS -->
        <div id="tabla" class="seccion card mb-3">
          <div class="card-body">

            <h5>Tabla y Filtros</h5>

            <!-- SELECTOR -->
            <select id="selectorHoja" class="form-select mb-2"></select>

            <button class="btn btn-info mb-3" onclick="mostrarTablaManual()">Mostrar Tabla</button>

            <!-- 🔥 FILTROS AQUÍ -->
            <div class="row g-2 mb-3">

              <div class="col-md-4">
                <input type="text" id="filtroNombre" class="form-control" placeholder="Buscar nombre">
              </div>

              <div class="col-md-4">
                <input type="date" id="filtroFechaDesde" class="form-control">
              </div>

              <div class="col-md-4">
                <input type="date" id="filtroFechaHasta" class="form-control">
              </div>

              

            </div>

            <div class="d-flex gap-2 mb-3">
              <button class="btn btn-warning" onclick="aplicarFiltros()">Filtrar</button>
              <button class="btn btn-secondary" onclick="limpiarFiltros()">Limpiar</button>
              <button class="btn btn-danger" onclick="abrirModalColumnas()">Exportar PDF</button>
            </div>

            <!-- TABLA -->
            <div id="contenedorTabla" class="tabla-responsive" style="display:none;">
              <table class="table table-bordered">
                <thead id="thead" class="table-dark"></thead>
                <tbody id="tbody"></tbody>
              </table>
            </div>

            <!-- PAGINACIÓN -->
            <div class="mt-3">
              <button class="btn btn-secondary" onclick="anteriorPagina()">Anterior</button>
              <button class="btn btn-secondary" onclick="siguientePagina()">Siguiente</button>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- MODAL SELECCIONAR COLUMNAS -->
  <div class="modal fade" id="modalColumnas" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">

        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title">Seleccionar columnas para PDF</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <div id="listaColumnas" class="row"></div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="seleccionarTodo(true)">Seleccionar todo</button>
          <button class="btn btn-warning" onclick="seleccionarTodo(false)">Quitar todo</button>
          <button class="btn btn-danger" onclick="generarPDFSeleccionado()">Exportar PDF</button>
        </div>

      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
  <script src="pfd.js"></script>
  <script src="excel.js"></script>

  <script>
    function toggleMenu() {
      document.querySelector(".sidebar").classList.toggle("activa");
    }
  </script>

  <script>
    function mostrarSeccion(id) {
      document.querySelectorAll(".seccion").forEach(sec => {
        sec.classList.remove("activa");
      });

      document.getElementById(id).classList.add("activa");
    }
  </script>

</body>

</html>
